<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Pagina web para probar POST
    <script>
      fetch ("/reporte",{
         method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
   body: JSON.stringify({
    mensaje: "actividad semana 5 de programadores para la paz",
  })
})
.then(response => {
  if (!response.ok) {
    throw new Error("Error en la petición");
  }
  return response.json();
})
.then(data => {
  console.log("Respuesta del servidor:", data);
})
.catch(error => {
  console.error("Error:", error);
});
    </script>
